name: Cypress Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  api-tests:
    name: 🔌 API Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run API tests
        run: npm run test:api
        env:
          CYPRESS_REQRES_API_KEY: ${{ secrets.CYPRESS_REQRES_API_KEY }}

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            cypress/artifacts
            cypress/reports

  ui-tests:
    name: 🖥️ UI Tests (${{ matrix.browser }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run UI tests on ${{ matrix.browser }}
        run: npx cypress run --browser ${{ matrix.browser }} --spec "cypress/e2e/ui/**/*.cy.ts"
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts-${{ matrix.browser }}
          path: |
            cypress/artifacts
            cypress/reports

  report:
    name: 📊 Generate Report
    needs: [api-tests, ui-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: cypress/

      - name: Generate Mochawesome HTML report
        run: npm run report:open
        continue-on-error: true

      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-final-report
          path: cypress/reports/html
